        :root {
            --bg-color: #0b0c10;

            --border-color: rgba(255, 255, 255, 0.08);
            --card-w: 240px;
            --card-h: 420px;
        }
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 0%, #1a1c23 0%, #0b0c10 70%);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: 900;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin: 0;
            font-weight: 500;
        }
        
        /* Dashboard controls container */
        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
            max-width: 1100px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(12px);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .filter-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .control-item label {
            font-size: 12px;
            font-weight: bold;
            color: #94a3b8;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        /* Premium segment buttons */
        .btn-group {
            display: flex;
            background: #1e293b;
            border-radius: 8px;
            padding: 2px;
            border: 1px solid var(--border-color);
        }
        
        .btn-segment {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        
        .btn-segment.active {
            background: #3b82f6;
            color: #fff;
        }
        
        /* Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            padding-bottom: 50px;
        }
        
        /* Mini Card Wrapper (Smart 9:16 aspect ratio) */
        .card-wrapper {
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            overflow: hidden;
            width: var(--card-w);
            height: var(--card-h);
            background: #111317;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s;
            justify-self: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-wrapper:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 15px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        /* Card Layout */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Card Layers */
        .card-layer-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        .card-layer-char {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }
        
        /* Card Overlay Texts (Scaled down from main viewer) */
        .role-name-japanese {
            writing-mode: vertical-rl;
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: #ffffff;
            letter-spacing: 4px;
            position: absolute;
            left: 16px;
            top: 20px;
            z-index: 3;
        }
        .role-name-japanese ruby {
            ruby-position: over;
        }
        .role-name-japanese rt {
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 8px;
            color: #ffffff;
            ruby-align: center;
            padding-left: 3px;

        .role-name-english-rt {

            font-weight: 900;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);

            right: 16px;
            top: 22px;
            letter-spacing: 0.5px;
            text-transform: capitalize;
            z-index: 3;
            text-align: right;
            max-width: 140px;
        }

            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            box-sizing: border-box;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 4;

        .camp-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 50px;
            flex-shrink: 0;

        .camp-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
        }
        .camp-label {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 7px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        
        .description-text {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 9.5px;
            line-height: 1.4;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.2px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Stats summary */
        .stats-summary {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Empty search state */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 0;
            color: #64748b;
            font-size: 15px;
        }

        .role-name-english-vertical {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: 20px;
            color: #ffffff;
            position: absolute;
            right: 16px;
            text-align: right;
            top: 20px;
            width: 200px;
            line-height: 1.15;
            letter-spacing: -1px;
            z-index: 3;
        }
    </style>
</head>

        let bgEnabled = true;
        const assetCacheVersion = '20260719-refined-assets';

        // Per-style folders: flatFolder = single combined image, transFolder = transparent character cutout
        const styleConfig = {
            a: {
                flatFolder: 'raw-illustrations-72-a',
                transFolder: 'raw-illustrations-transparent-72',
                compositeViewerVersion: 'raw-illustrations-72-a2'
            },
            lifelike: {
                flatFolder: 'raw-illustrations-72-a-lifelike',
                transFolder: '00_transparent-illustrations-72-a-lifelike',
                compositeViewerVersion: 'lifelike-trans'
            },
            refined: {
                flatFolder: 'raw-illustrations-72-a-refined',
                transFolder: '00_transparent-illustrations-72-a-refined',
                compositeViewerVersion: 'refined-trans'
            }
        };

        function versionedAsset(path) {
            return `${path}?v=${assetCacheVersion}`;
        }

        // The supplied Lifelike PNGs use a blue-screen background on some cards.
        // Convert only strongly blue pixels to transparent in the browser, keeping
        // metal highlights and dark ink lines intact. Refined assets already carry alpha.
        function applyBlueScreenTransparency(canvas, imageUrl) {
            const image = new Image();
            image.decoding = 'async';
            image.onload = () => {
                const width = 384;
                const height = 672;
                const context = canvas.getContext('2d', { willReadFrequently: true });
                canvas.width = width;
                canvas.height = height;
                context.drawImage(image, 0, 0, width, height);

                const imageData = context.getImageData(0, 0, width, height);
                const pixels = imageData.data;
                for (let index = 0; index < pixels.length; index += 4) {
                    const red = pixels[index];
                    const green = pixels[index + 1];
                    const blue = pixels[index + 2];
                    const strongestNonBlue = Math.max(red, green);

                    if (blue > 115 && blue > red * 1.35 && blue > green * 1.22) {
                        const strength = Math.min(1, (blue - strongestNonBlue * 1.22) / 42);
                        pixels[index + 3] = Math.round(pixels[index + 3] * (1 - strength));
                    }
                }
                context.putImageData(imageData, 0, 0);
            };
            image.src = imageUrl;
        }

        // Render Card Gallery List
        function renderGallery() {
            const grid = document.getElementById("gallery-grid");
            grid.innerHTML = "";
            
            const searchVal = document.getElementById("search-input").value.toLowerCase();
            const campVal = document.getElementById("camp-filter").value;
            
            let matchCount = 0;
            
            rolesData.forEach(role => {
                // Filter checks
                const matchesSearch = role.jp.toLowerCase().includes(searchVal) || 
                                      role.en.toLowerCase().includes(searchVal) ||
                                      (role.desc_ja && role.desc_ja.toLowerCase().includes(searchVal)) ||
                                      (role.desc_en && role.desc_en.toLowerCase().includes(searchVal));
                                      
                const matchesCamp = (campVal === 'all') || (role.camp === campVal);
                
                if (matchesSearch && matchesCamp) {
                    matchCount++;
                    
                    // Paths builder
                    let bgPath = "";
                    let charPath = "";
                    
                    let bgId = role.id;
                    let flatImgName = `${role.id}_ver_a.png`;
                    let charImgName = `${role.id}_ver_a.png`;
                    
                    if (role.id === "magician_c") {
                        bgId = "magician";
                        flatImgName = "magician_ver_c.png";
                        charImgName = "magician_ver_c.png";
                    }
                    
                    const styleFolders = styleConfig[currentStyle];

                    if (currentMode === 'flat') {
                        // Flat backgrounds (one consolidated image)
                        bgPath = versionedAsset(`${styleFolders.flatFolder}/${flatImgName}`);
                    } else {
                        // Transparent character + optional background image, matched to the selected style
                        if (bgEnabled) {
                            bgPath = versionedAsset(`backgrounds-72/${bgId}_bg.png`);
                        } else {
                            bgPath = ""; // Empty/black background
                        }
                        charPath = versionedAsset(`${styleFolders.transFolder}/${charImgName}`);
                    }
                    const needsBlueKey = currentMode === 'trans' && currentStyle === 'lifelike';

                    // Create card element
                    const cardWrapper = document.createElement("div");
                    cardWrapper.className = "card-wrapper";
                    cardWrapper.onclick = () => {
                        const viewerVersion = currentMode === 'trans'
                            ? styleFolders.compositeViewerVersion
                            : styleFolders.flatFolder;
                        window.open(`card_viewer.html?role=${role.id}&lang=${currentLang}&ver=${encodeURIComponent(viewerVersion)}`, '_blank');
                    };
                    
                    // Build card DOM structure
                    let nameHtml = "";
                    if (currentLang === 'ja') {
                        // Ruby layout for JP
                        let jpNameWithRuby = "";
                        let rubyIdx = 0;
                        for (let char of role.jp) {
                            if (role.rubies && role.rubies[rubyIdx]) {
                                jpNameWithRuby += `<ruby>${char}<rt>${role.rubies[rubyIdx]}</rt></ruby>`;
                            } else {
                                jpNameWithRuby += char;
                            }
                            rubyIdx++;
                        }
                        nameHtml = `
                            <div class="role-name-japanese">${jpNameWithRuby}</div>
                            <div class="role-name-english-rt">${role.en}</div>
                        `;
                    } else {
                        // Large Horizontal layout for EN
                        nameHtml = `
                            <div class="role-name-english-vertical">${role.en}</div>
                        `;
                    }
                    
                    // Icon and Camp text mapping (matching card_viewer.html)
                    let iconName = role.camp;
                    if (role.camp === "fox") {
                        iconName = "neutral";
                    }
                    
                    let campText = "市民チーム";
                    if (role.camp === 'werewolf') campText = "人狼チーム";
                    if (role.camp === 'fox') campText = "第三陣営";
                    if (currentLang === 'en') {
                        campText = role.camp === 'citizen' ? "CITIZEN TEAM" : 
                                   role.camp === 'werewolf' ? "WEREWOLF TEAM" : "THIRD CAMP";
                    }
                    
                    const descText = currentLang === 'ja' ? role.desc_ja : role.desc_en;
                    
                    cardWrapper.innerHTML = `
                        <div class="card">
                            ${bgPath ? `<div class="card-layer-bg" style="background-image: url('${bgPath}')"></div>` : `<div class="card-layer-bg" style="background: #111317;"></div>`}
                            ${charPath
                                ? (needsBlueKey
                                    ? `<canvas class="card-layer-char" aria-hidden="true"></canvas>`
                                    : `<div class="card-layer-char" style="background-image: url('${charPath}')"></div>`)
                                : ''}
                            
                            <!-- Header Text Overlays -->
                            ${nameHtml}
                            
                            <!-- Bottom STICKY Description Band (Exactly matching proportion of card_viewer.html) -->
                            <div class="card-description-band">
                                <div class="camp-container">
                                    <img class="camp-icon" src="gz/${iconName}.png" alt="Camp Icon">
                                    <div class="camp-label">${campText}</div>
                                </div>
                                <div class="description-text">${descText}</div>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(cardWrapper);
                    if (needsBlueKey) {
                        applyBlueScreenTransparency(cardWrapper.querySelector('canvas.card-layer-char'), charPath);
                    }
                }
            });
            
            // Update stats
            document.getElementById("stats-summary").innerText = `Total: ${matchCount} cards showing`;
            
            if (matchCount === 0) {
                grid.innerHTML = `<div class="no-results">一致する役職が見つかりませんでした (No matching cards found)</div>`;
            }
        }
        
        // Control actions
        function filterCards() {
            renderGallery();
        }
        
        function setLang(lang) {
            currentLang = lang;
            document.getElementById("lang-jp").classList.toggle("active", lang === 'ja');
            document.getElementById("lang-en").classList.toggle("active", lang === 'en');
            renderGallery();
        }
        
        function setStyle(style) {
            currentStyle = style;
            document.querySelectorAll(".control-item .btn-segment[id^='style-']").forEach(btn => {
                btn.classList.remove("active");
            });
            document.getElementById(`style-${style}`).classList.add("active");
            renderGallery();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".control-item .btn-segment[id^='mode-']").forEach(btn => {
                btn.classList.remove("active");
            });
            document.getElementById(`mode-${mode}`).classList.add("active");

            // Dim/enable BG controller without removing it from flow to prevent shifting
            const bgControl = document.getElementById("bg-control-item");
            if (mode === 'trans') {
                bgControl.style.opacity = "1";
                bgControl.style.pointerEvents = "auto";
            } else {
                bgControl.style.opacity = "0.25";
                bgControl.style.pointerEvents = "none";
            }
            renderGallery();
        }
        
        function setBg(enabled) {
            bgEnabled = enabled;
            document.getElementById("bg-on").classList.toggle("active", enabled);
            document.getElementById("bg-off").classList.toggle("active", !enabled);
            renderGallery();
        }
        
        // Init view
        window.onload = () => {
            renderGallery();
        };
    </script>
</body>
</html>
