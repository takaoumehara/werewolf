<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人狼ゲーム カードギャラリー (All Cards View)</title>
    <!-- Google Fonts Load: LINE Seed JP (Bold 700) & Cinzel Decorative (Black 900) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=LINE+Seed+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --card-w: 240px;
            --card-h: 420px;
        }
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 0%, #1a1c23 0%, #0b0c10 70%);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: 900;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin: 0;
            font-weight: 500;
        }

        .position-editor-link {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            margin-top: 16px;
            padding: 0 14px;
            border: 1px solid rgba(255, 65, 108, 0.48);
            border-radius: 7px;
            color: #ff809c;
            background: rgba(255, 65, 108, 0.08);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }

        .position-editor-link:hover,
        .position-editor-link:focus-visible {
            border-color: #ff416c;
            color: #fff;
            background: rgba(255, 65, 108, 0.18);
            outline: none;
        }
        
        /* Dashboard controls container */
        .controls-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
            max-width: 1100px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(12px);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .filter-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .control-item label {
            font-size: 12px;
            font-weight: bold;
            color: #94a3b8;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        
        /* Segmented buttons for toggles */
        .btn-group {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border-color);
        }
        .btn-segment {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-segment.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
        }
        .btn-segment:hover:not(.active) {
            color: #f1f5f9;
        }
        
        /* Stats summary bar */
        .stats-summary {
            margin-bottom: 25px;
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Gallery Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            justify-items: center;
        }
        
        /* Scaled Smartphone Card for Gallery (Width: 240px, Height: 420px) */
        .card-wrapper {
            position: relative;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            overflow: hidden;
            width: var(--card-w);
            height: var(--card-h);
            background: #111317;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            user-select: none;
        }
        
        .card-wrapper:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 45px -5px rgba(255, 65, 108, 0.25), 0 0 20px rgba(59, 130, 246, 0.2);
        }
        
        /* Dynamic Card Internal Structure */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .card-layer-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        
        .card-layer-char {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        .card-layer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }
        
        /* Japanese Mode Title */
        .role-name-japanese {
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: absolute;
            top: 16px;
            left: 16px;
            color: #ffffff;
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 26px; /* Scaled down for 240px card width */
            letter-spacing: 4px;
            line-height: 1.0;
            z-index: 10;
        }
        .role-name-japanese ruby {
            ruby-position: over;
        }
        .role-name-japanese rt {
            font-size: 8px;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Japanese Mode Subtitle English */
        .role-name-english-rt {
            position: absolute;
            top: 18px;
            right: 16px;
            color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: 9.5px;
            letter-spacing: 1px;
            text-align: right;
            text-transform: uppercase;
            z-index: 10;
            line-height: 1.2;
            max-width: 120px;
            word-wrap: break-word;
        }

        /* English Mode Title */
        .role-name-english-vertical {
            position: absolute;
            top: 18px;
            right: 16px;
            color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            text-align: right;
            text-transform: uppercase;
            z-index: 10;
            line-height: 1.1;
            max-width: 180px;
            word-wrap: break-word;
        }
        
        /* Description Band */
        .card-description-band {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(13, 15, 18, 0.96) 0%, rgba(13, 15, 18, 0.88) 75%, rgba(13, 15, 18, 0) 100%);
            padding: 24px 16px 16px 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
        .camp-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .camp-icon {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }
        .camp-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #e2e8f0;
        }
        .description-text {
            font-size: 10.5px;
            line-height: 1.45;
            color: #cbd5e1;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="gallery-title">人狼ゲーム カードギャラリー</h1>
        <p class="subtitle" id="gallery-subtitle">人狼ゲーム 全25役職カード一覧・一括プレビュー</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;">
            <a class="position-editor-link" href="card_position_editor.html">🎛 POSITION EDITOR</a>
            <a class="position-editor-link" href="card_viewer.html">👁 CARD VIEWER</a>
            <a class="position-editor-link" href="index.html">🏠 BACK TO APP</a>

    <!-- Controls Dashboard -->
    <div class="controls-panel">
        <!-- Search -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="役職名で検索 (Search cards...)" oninput="filterCards()">
        </div>
        
        <div class="filter-groups">
            <!-- Camp Filter -->
            <div class="control-item">
                <label id="lbl-camp">陣営 (CAMP)</label>
                <select id="camp-filter" onchange="filterCards()">

                    <option value="citizen" id="opt-camp-citizen">市民陣営 (Citizen Camp)</option>
                    <option value="werewolf" id="opt-camp-werewolf">人狼陣営 (Werewolf Camp)</option>
                    <option value="fox" id="opt-camp-fox">第三陣営 (Others / Fox)</option>
                </select>
            </div>
            
            <!-- Lang Switcher -->
            <div class="control-item">
                <label id="lbl-lang">言語 (LANG)</label>
                <div class="btn-group">
                    <button class="btn-segment active" id="lang-jp" onclick="setLang('ja')">JP</button>
                    <button class="btn-segment" id="lang-en" onclick="setLang('en')">EN</button>
                </div>
            </div>
            
            <!-- Style Switcher -->
            <div class="control-item">
                <label id="lbl-style">スタイル (STYLE)</label>
                <div class="btn-group">
                    <button class="btn-segment active" id="style-refined" onclick="setStyle('refined')">Refined</button>
                    <button class="btn-segment" id="style-lifelike" onclick="setStyle('lifelike')">Lifelike</button>
                    <button class="btn-segment" id="style-a" onclick="setStyle('a')">Ver. A</button>
                </div>
            </div>

            <!-- Background Toggle -->
            <div class="control-item" id="bg-control-item">
                <label id="lbl-bg">背景 (BG)</label>
                <div class="btn-group">
                    <button class="btn-segment active" id="bg-on" onclick="setBg(true)">ON</button>
                    <button class="btn-segment" id="bg-off" onclick="setBg(false)">OFF</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="stats-summary" id="stats-summary">
        全 26 枚表示中
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="gallery-grid">

    </div>

    <script>
        const rolesData = [
            { id: "dictator", jp: "独裁者", en: "Dictator", rubies: ["どく", "さい", "しゃ"], camp: "citizen", desc_ja: "投票時に自分の正体を明かすことで、その日の投票を自分一人で決定できる。", desc_en: "By revealing your true identity during the vote, you can decide the vote of the day all by yourself." },
            { id: "knights", jp: "騎士団", en: "Knights", rubies: ["き", "し", "だん"], camp: "citizen", desc_ja: "毎日一人を指定して、人狼の襲撃から守ることができる。ただし自分自身は守れない。", desc_en: "Can protect one player from the werewolf attack every night. Cannot protect themselves." },
            { id: "double", jp: "影武者", en: "Double", rubies: ["かげ", "む", "しゃ"], camp: "citizen", desc_ja: "最初に指定した市民と同じ役職になり、その身代わりとして人狼の前に立ち塞がる。", desc_en: "Becomes the same role as a designated citizen at the start, sacrificing themselves in their place." },
            { id: "counselor", jp: "カウンセラー", en: "Counselor", rubies: ["", "", "", "", "", ""], camp: "citizen", desc_ja: "他のプレイヤーの精神を分析し、人狼の恐怖に呑まれかけている者を正常に導く。", desc_en: "Analyzes the mental state of another player, leading those slipping into werewolf fear back to sanity." },
            { id: "necromancer", jp: "霊媒師", en: "Necromancer", rubies: ["れい", "ばい", "し"], camp: "citizen", desc_ja: "毎夜、前日に処刑されたプレイヤーが「人狼」であったか「人間」であったかを知ることができる。", desc_en: "Can know every night whether the player executed on the previous day was a 'Werewolf' or a 'Human'." },
            { id: "trapper", jp: "罠師", en: "Trapper", rubies: ["わな", "し"], camp: "citizen", desc_ja: "指定した場所に罠を仕掛け、人狼が襲撃に来た際に罠にハメて相打ちに持ち込む。", desc_en: "Sets a trap in a designated place, taking down the werewolf with them if they attack there." },
            { id: "citizen", jp: "市民", en: "Citizen", rubies: ["し", "みん"], camp: "citizen", desc_ja: "特別な能力は持たないが、お互いの信頼と鋭い議論によって人狼の正体を見破る主役。", desc_en: "Has no special abilities, but is the main protagonist who exposes the werewolves through trust and sharp discussions." },
            { id: "prophet", jp: "予言者", en: "Prophet", rubies: ["よ", "げん", "しゃ"], camp: "citizen", desc_ja: "毎夜、生存しているプレイヤーの中から一人を指定し、「人狼」か「人間」かを知ることができる。", desc_en: "Can designate one player every night to learn whether they are a 'Werewolf' or a 'Human'." },
            { id: "bodyguard", jp: "ボディガード", en: "Bodyguard", rubies: ["", "", "", "", "", ""], camp: "citizen", desc_ja: "強靭な肉体で市民を守る。夜の襲撃から指定したプレイヤーを一人だけ守護する。", desc_en: "Protects citizens with a strong body. Protects one designated player from night attacks." },
            { id: "twins", jp: "共有者", en: "Twins", rubies: ["きょう", "ゆう", "しゃ"], camp: "citizen", desc_ja: "もう一人の共有者とお互いが人間であることを最初から知っている、お互いの絆で繋がった二人。", desc_en: "Two players connected by bond who know from the beginning that they are both human." },
            { id: "magician", jp: "奇術師", en: "Magician", rubies: ["き", "じゅつ", "し"], camp: "citizen", desc_ja: "手品のように他のプレイヤーの役職を一時的に入れ替え、議論の方向性を攪乱する。", desc_en: "Temporarily swaps roles of other players like a magic trick to confuse the direction of the discussion." },
            { id: "hunter", jp: "ハンター", en: "Hunter", rubies: ["", "", "", "", ""], camp: "citizen", desc_ja: "自分が処刑または人狼に殺された際、最後の一撃で他のプレイヤー一人を道連れにして死亡する。", desc_en: "When executed or killed by werewolves, takes one other player down with them as a parting shot." },
            { id: "tough_guy", jp: "タフガイ", en: "Tough Guy", rubies: ["", "", "", "", ""], camp: "citizen", desc_ja: "人狼に襲撃されてもその夜は死なず、次の日の夜に怪我の悪化によって死亡するタフな人間。", desc_en: "Does not die the night they are attacked by werewolves, but dies the following night due to worsening wounds." },
            { id: "spy", jp: "スパイ", en: "Spy", rubies: ["", "", "", ""], camp: "werewolf", desc_ja: "市民陣営の中に紛れ込み、夜の会話をこっそり人狼チームへ送信する情報工作員。", desc_en: "Blends in with the citizens and secretly relays the night discussions to the werewolf team." },
            { id: "betrayal_twin", jp: "裏切りの共有者", en: "Betrayal Twin", rubies: ["うら", "ぎ", "", "", "きょう", "ゆう", "しゃ"], camp: "werewolf", desc_ja: "共有者のふりをしているが、実は心は人狼陣営。お互いの正体を知る裏切り者の双子。", desc_en: "Pretends to be a twin but is actually on the werewolf side, knowing each other's identity." },

            { id: "lone_wolf", jp: "一匹狼", en: "Lone Wolf", rubies: ["いっ", "ぴき", "おおかみ"], camp: "werewolf", desc_ja: "他の人狼と会話することはできないが、自分の意志で独立した単独襲撃を行うことができる人狼。", desc_en: "Cannot talk to other werewolves, but can conduct independent single attacks of their own." },
            { id: "god", jp: "神様", en: "God", rubies: ["かみ", "さま", ""], camp: "citizen", desc_ja: "天界から全てを見通す。毎夜、誰が襲撃されたかを神の神託として受け取る高貴な存在。", desc_en: "Sees all from the heavens. Receives the name of the attacked player every night as a divine revelation." },
            { id: "lovers", jp: "恋人", en: "Lovers", rubies: ["こい", "びと", ""], camp: "citizen", desc_ja: "恋に落ちた二人。どちらか一方が死亡した場合、もう片方も悲しみのあまり即座に死亡する。", desc_en: "Two in love. If one dies, the other immediately dies of grief." },
            { id: "mysterious_fox", jp: "妖狐", en: "Mysterious Fox", rubies: ["よう", "こ", ""], camp: "fox", desc_ja: "人狼の襲撃では死なないが、予言者に占われると呪殺され死亡する。最後まで生き残れば単独勝利。", desc_en: "Does not die from werewolf attacks, but dies if divined by the prophet. Wins alone if surviving to the end." },

            bodyguard: { scale: 0.92, x: -1.25, y: 3.82 }, twins: { scale: 1.24, x: -0.39, y: 3.37 },
            magician: { scale: 0.9, x: -2.72, y: 0.46 },
            hunter: { scale: 1, x: -0.71, y: 0.72 }, tough_guy: { scale: 1, x: 0, y: 0 }, spy: { scale: 1, x: 0, y: 0 },
            betrayal_twin: { scale: 0.89, x: -0.1, y: 5.32 }, werewolf: { scale: 0.98, x: 0.27, y: 8.16 },
            traitor: { scale: 0.91, x: 1.75, y: 4.57 }, betrayer: { scale: 1, x: 1.57, y: 2.9 },
            werewolf_child: { scale: 0.95, x: -0.15, y: 4.54 }, android: { scale: 1.02, x: 0.68, y: 4.56 },
            lone_wolf: { scale: 1, x: -1.27, y: 4.8 }, god: { scale: 1.09, x: 0, y: 0 },
            lovers: { scale: 1, x: 2.01, y: 0.52 }, mysterious_fox: { scale: 1, x: 0, y: 0 },
            ghost_wolf: { scale: 1.38, x: -2.03, y: -2.77 }
        };

        const styleConfig = {
            a: {
                transFolder: 'raw-illustrations-transparent-72',
                compositeViewerVersion: 'a'
            },
            lifelike: {
                transFolder: '00_transparent-illustrations-72-a-lifelike',
                compositeViewerVersion: 'lifelike'
            },
            refined: {
                transFolder: '00_transparent-illustrations-72-a-refined',
                compositeViewerVersion: 'refined'
            }
        };

        function versionedAsset(path) {
            return `${path}?v=${assetCacheVersion}`;
        }

        function applyBlueScreenTransparency(canvas, imageUrl) {
            const image = new Image();
            image.decoding = 'async';
            image.onload = () => {
                const width = 384;
                const height = 672;
                const context = canvas.getContext('2d', { willReadFrequently: true });
                canvas.width = width;
                canvas.height = height;
                context.drawImage(image, 0, 0, width, height);

                const imageData = context.getImageData(0, 0, width, height);
                const pixels = imageData.data;
                for (let index = 0; index < pixels.length; index += 4) {
                    const red = pixels[index];
                    const green = pixels[index + 1];
                    const blue = pixels[index + 2];
                    const strongestNonBlue = Math.max(red, green);

                    if (blue > 115 && blue > red * 1.35 && blue > green * 1.22) {
                        const strength = Math.min(1, (blue - strongestNonBlue * 1.22) / 42);
                        pixels[index + 3] = Math.round(pixels[index + 3] * (1 - strength));
                    }
                }
                context.putImageData(imageData, 0, 0);
            };
            image.src = imageUrl;
        }

        function setLang(lang) {
            currentLang = lang;
            document.getElementById("lang-jp").classList.toggle("active", lang === 'ja');
            document.getElementById("lang-en").classList.toggle("active", lang === 'en');
            
            // Translate UI elements
            document.getElementById("gallery-title").textContent = lang === 'ja' ? "人狼ゲーム カードギャラリー" : "WEREWOLF CARD GALLERY";
            document.getElementById("gallery-subtitle").textContent = lang === 'ja' ? "人狼ゲーム 全カード一覧・一括プレビュー" : "All Werewolf Cards View";
            document.getElementById("search-input").placeholder = lang === 'ja' ? "役職名で検索 (Search cards...)" : "Search cards...";
            document.getElementById("lbl-camp").textContent = lang === 'ja' ? "陣営 (CAMP)" : "CAMP";
            document.getElementById("lbl-lang").textContent = lang === 'ja' ? "言語 (LANG)" : "LANG";
            document.getElementById("lbl-style").textContent = lang === 'ja' ? "スタイル (STYLE)" : "STYLE";
            document.getElementById("lbl-bg").textContent = lang === 'ja' ? "背景 (BG)" : "BACKGROUND";
            
            document.getElementById("opt-camp-all").textContent = lang === 'ja' ? "すべて (All Camps)" : "All Camps";
            document.getElementById("opt-camp-citizen").textContent = lang === 'ja' ? "市民陣営 (Citizen Camp)" : "Citizen Camp";
            document.getElementById("opt-camp-werewolf").textContent = lang === 'ja' ? "人狼陣営 (Werewolf Camp)" : "Werewolf Camp";
            document.getElementById("opt-camp-fox").textContent = lang === 'ja' ? "第三陣営 (Others / Fox)" : "Neutral / Fox";

            renderGallery();
        }

        function setStyle(style) {
            currentStyle = style;
            document.getElementById("style-a").classList.toggle("active", style === 'a');
            document.getElementById("style-lifelike").classList.toggle("active", style === 'lifelike');
            document.getElementById("style-refined").classList.toggle("active", style === 'refined');
            renderGallery();
        }

        function setBg(enabled) {
            bgEnabled = enabled;
            document.getElementById("bg-on").classList.toggle("active", bgEnabled);
            document.getElementById("bg-off").classList.toggle("active", !bgEnabled);
            renderGallery();
        }

        function filterCards() {
            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById("gallery-grid");
            grid.innerHTML = "";
            
            const searchVal = document.getElementById("search-input").value.toLowerCase();
            const campVal = document.getElementById("camp-filter").value;
            
            let matchCount = 0;
            
            rolesData.forEach(role => {
                const matchesSearch = role.jp.toLowerCase().includes(searchVal) || 
                                      role.en.toLowerCase().includes(searchVal) ||
                                      (role.desc_ja && role.desc_ja.toLowerCase().includes(searchVal)) ||
                                      (role.desc_en && role.desc_en.toLowerCase().includes(searchVal));
                                      
                const matchesCamp = (campVal === 'all') || (role.camp === campVal);
                
                if (matchesSearch && matchesCamp) {
                    matchCount++;
                    
                    let bgId = role.id;
                    let charImgName = `${role.id}_ver_a.png`;
                    
                    if (role.id === "magician_c") {
                        bgId = "magician";
                        charImgName = "magician_ver_c.png";
                    }
                    
                    const styleFolders = styleConfig[currentStyle] || styleConfig.refined;

                    const bgPath = bgEnabled ? versionedAsset(`backgrounds-72/${bgId}_bg.png`) : "";
                    const charPath = versionedAsset(`${styleFolders.transFolder}/${charImgName}`);
                    
                    const needsBlueKey = currentStyle === 'lifelike';
                    const refinedPosition = currentStyle === 'refined' ? REFINED_POSITIONS[role.id] : null;
                    const characterTransform = refinedPosition
                        ? `transform: translate3d(${refinedPosition.x}%, ${refinedPosition.y}%, 0) scale(${refinedPosition.scale}); transform-origin: center center;`
                        : '';

                    // Create card element
                    const cardWrapper = document.createElement("div");
                    cardWrapper.className = "card-wrapper";
                    cardWrapper.onclick = () => {
                        window.open(`card_viewer.html?role=${role.id}&lang=${currentLang}&ver=${styleFolders.compositeViewerVersion}`, '_blank');
                    };
                    
                    let nameHtml = "";
                    if (currentLang === 'ja') {
                        let jpNameWithRuby = "";
                        let rubyIdx = 0;
                        for (let char of role.jp) {
                            if (role.rubies && role.rubies[rubyIdx]) {
                                jpNameWithRuby += `<ruby>${char}<rt>${role.rubies[rubyIdx]}</rt></ruby>`;
                            } else {
                                jpNameWithRuby += char;
                            }
                            rubyIdx++;
                        }
                        nameHtml = `
                            <div class="role-name-japanese">${jpNameWithRuby}</div>
                            <div class="role-name-english-rt">${role.en}</div>
                        `;
                    } else {
                        function getEnStyle(enName) {
                            if (enName.length > 16) return 'font-size:15px;letter-spacing:-0.5px;';
                            if (enName.length > 12) return 'font-size:18px;letter-spacing:-1px;';
                            return 'font-size:21px;letter-spacing:-1px;';
                        }
                        nameHtml = `
                            <div class="role-name-english-vertical" style="${getEnStyle(role.en)}">${role.en}</div>
                        `;
                    }

                    let campLabelText = "";
                    if (currentLang === 'ja') {
                        if (role.camp === 'citizen') campLabelText = '市民陣営';
                        else if (role.camp === 'werewolf') campLabelText = '人狼陣営';
                        else campLabelText = '第三陣営';
                    } else {
                        if (role.camp === 'citizen') campLabelText = 'CITIZEN TEAM';
                        else if (role.camp === 'werewolf') campLabelText = 'WEREWOLF TEAM';
                        else campLabelText = 'NEUTRAL ROLE';
                    }

                    let iconName = role.camp;
                    if (role.camp === "fox") iconName = "neutral";
                    
                    let charMarkup = `<div class="card-layer-char" style="background-image: url('${charPath}'); ${characterTransform}"></div>`;
                    if (needsBlueKey) {
                        charMarkup = `<canvas class="card-layer-canvas" id="canvas-${role.id}"></canvas>`;
                    }
                    
                    cardWrapper.innerHTML = `
                        <div class="card">
                            <div class="card-layer-bg" style="background-image: ${bgPath ? `url('${bgPath}')` : 'none'}"></div>
                            ${charMarkup}
                            ${nameHtml}
                            <div class="card-description-band">
                                <div class="camp-container">
                                    <img class="camp-icon" src="icons/camp/${iconName}.png" alt="${role.camp}">
                                    <div class="camp-label">${campLabelText}</div>
                                </div>
                                <div class="description-text">${currentLang === 'ja' ? role.desc_ja : role.desc_en}</div>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(cardWrapper);

                    if (needsBlueKey) {
                        const canvas = document.getElementById(`canvas-${role.id}`);
                        if (canvas) {
                            applyBlueScreenTransparency(canvas, charPath);
                        }
                    }
                }
            });

            // Update stats counter
            const stats = document.getElementById("stats-summary");
            if (currentLang === 'ja') {
                stats.textContent = `全 ${matchCount} 枚表示中 (全 ${rolesData.length} 枚)`;
            } else {
                stats.textContent = `Total ${matchCount} cards showing (${rolesData.length} total)`;
            }
        }

        // Init
        setLang('ja');
    </script>
</body>
