    gate-wolf-figureground.svg — reusing its already-traced wolf silhouette,
    since hand-typed wolf coordinates failed twice before; see
    _archive/logos/svg/hidden-wolf-ruins.svg). At a glance this reads as a
    single hooded silhouette with a crescent moon at its collar — one of the
    "two facing masks" hoods, closed. Look again: the "empty" darkness inside
    the hood is not empty. Its outline is the wolf's profile. One shape, two
    readings, nothing added to signal the trick — mixing the mask/hood
    motif, the moon, and the hidden-wolf concept into one mark.
