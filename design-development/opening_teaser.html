<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA SECRETA — Opening Teaser Prototype</title>
    <link rel="stylesheet" href="../design-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=LINE+Seed+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #08090c;
            color: #e2e8f0;
            font-family: 'LINE Seed JP', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .teaser-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Slide Layers */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1), transform 8s linear;
            background-size: cover;
            background-position: center;
            transform: scale(1.08);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1.0);
        }

        /* Overlay Dark Gradient */
        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(8, 9, 12, 0.2) 0%, rgba(8, 9, 12, 0.85) 80%, rgba(8, 9, 12, 0.98) 100%),
                        linear-gradient(to bottom, rgba(8, 9, 12, 0.6) 0%, transparent 40%, transparent 60%, rgba(8, 9, 12, 0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Subtitle Text Overlay */
        .caption-box {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            max-width: 800px;
            width: 90%;
            pointer-events: none;
        }

        .caption-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #f1f5f9;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 10px rgba(226, 232, 240, 0.5);
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .caption-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .caption-sub {
            font-size: 0.9rem;
            color: #94a3b8;
            letter-spacing: 0.15em;
            margin-top: 8px;
        }

        /* Final Logo Reveal Section */
        .logo-reveal {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 2s ease, transform 2s ease;
            pointer-events: none;
        }

        .logo-reveal.active {
            opacity: 1;
            transform: scale(1.0);
            pointer-events: auto;
        }

        .logo-image {
            max-width: 480px;
            width: 80vw;
            filter: drop-shadow(0 0 30px rgba(226, 54, 54, 0.4)) drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        .tagline {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            color: #e2e8f0;
            margin-top: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* Control Panel */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            gap: 12px;
        }

        .btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(226, 232, 240, 0.2);
            color: #cbd5e1;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: #94a3b8;
            color: #fff;
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #38bdf8, #ef4444);
            z-index: 30;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="progress-bar"></div>

    <div class="controls">
        <button class="btn" id="btn-replay">🎬 最初から再生</button>
        <button class="btn" id="btn-toggle-auto">⏸ 一時停止</button>
    </div>

    <div class="teaser-container">
        <!-- Slides -->
        <div class="slide active" id="slide-1" style="background-image: url('key-visuals/kv_shadow_ruins.png');"></div>
        <div class="slide" id="slide-2" style="background-image: url('key-visuals/kv_tech_ruins_shadow.png');"></div>
        <div class="slide" id="slide-3" style="background-image: url('key-visuals/kv_ruined_street.png');"></div>
        
        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Captions -->
        <div class="caption-box">
            <div class="caption-text" id="caption-text">文明が崩壊して100年。人々は高層ビルの遺構を城壁とした。</div>
            <div class="caption-sub" id="caption-sub">ACT I — THE LAST CITADEL</div>
        </div>

        <!-- Final Title Logo -->
        <div class="logo-reveal" id="logo-reveal">
            <img src="logo/logo_concept_luna_secreta.png" alt="LUNA SECRETA Logo" class="logo-image">
            <div class="tagline">〜 最後の城塞都市と偽りの羊 〜</div>
        </div>
    </div>

    <script>
        const scriptData = [
            {
                slideId: 'slide-1',
                text: '文明が崩壊して100年。人々は高層ビルの遺構を城壁とした。',
                sub: 'ACT I — THE LAST CITADEL',
                duration: 5000
            },
            {
                slideId: 'slide-2',
                text: '失われた科学は「魔術」と呼ばれ、狂気と神託が混在する。',
                sub: 'ACT II — ANCIENT TECHNOLOGY & ORACLE',
                duration: 5000
            },
            {
                slideId: 'slide-3',
                text: '見た目は人間。しかし、壁に伸びる影は人狼——',
                sub: 'ACT III — MIMICRY OF THE BEAST',
                duration: 5500
            },
            {
                slideId: null, // Final Reveal
                text: '誰が怪物か。真実を暴け。',
                sub: 'LUNA SECRETA',
                showLogo: true,
                duration: 7000
            }
        ];

        let currentIndex = 0;
        let isPlaying = true;
        let timer = null;
        let progressTimer = null;
        let startTime = 0;

        const slides = document.querySelectorAll('.slide');
        const captionText = document.getElementById('caption-text');
        const captionSub = document.getElementById('caption-sub');
        const logoReveal = document.getElementById('logo-reveal');
        const progressBar = document.getElementById('progress-bar');
        const btnReplay = document.getElementById('btn-replay');
        const btnToggleAuto = document.getElementById('btn-toggle-auto');

        function playStep(index) {
            currentIndex = index;
            const step = scriptData[index];

            // Update Slides
            slides.forEach(s => s.classList.remove('active'));
            if (step.slideId) {
                const targetSlide = document.getElementById(step.slideId);
                if (targetSlide) targetSlide.classList.add('active');
            }

            // Update Captions
            captionText.classList.remove('show');
            setTimeout(() => {
                captionText.textContent = step.text;
                captionSub.textContent = step.sub;
                captionText.classList.add('show');
            }, 300);

            // Logo Reveal State
            if (step.showLogo) {
                logoReveal.classList.add('active');
            } else {
                logoReveal.classList.remove('active');
            }

            // Progress Bar Animation
            startTime = Date.now();
            clearInterval(progressTimer);
            progressTimer = setInterval(() => {
                if (!isPlaying) return;
                const elapsed = Date.now() - startTime;
                const pct = Math.min((elapsed / step.duration) * 100, 100);
                progressBar.style.width = pct + '%';
            }, 50);

            // Timer for Next Step
            clearTimeout(timer);
            if (isPlaying) {
                timer = setTimeout(() => {
                    let next = index + 1;
                    if (next >= scriptData.length) next = scriptData.length - 1;
                    playStep(next);
                }, step.duration);
            }
        }

        btnReplay.addEventListener('click', () => {
            isPlaying = true;
            btnToggleAuto.textContent = '⏸ 一時停止';
            playStep(0);
        });

        btnToggleAuto.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                btnToggleAuto.textContent = '⏸ 一時停止';
                playStep(currentIndex);
            } else {
                btnToggleAuto.textContent = '▶ 再生';
                clearTimeout(timer);
                clearInterval(progressTimer);
            }
        });

        // Initialize First Play
        playStep(0);
    </script>
</body>
</html>
