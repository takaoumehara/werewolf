<!-- @dsCard group="Colors" viewport="700x210" subtitle="data-phase で surface / ink / accent が切替わる" name="Phase Modes" -->
<meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-ui);background:var(--surface-page);color:var(--ink-body);-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;align-items:stretch}
.pad{padding:16px 20px}
.cap{font-size:12px;line-height:1.5;color:var(--ink-muted)}
.mono{font-family:var(--font-code)}
</style><div class="pad row" style="gap:8px">

<div data-phase="day" style="flex:1;background:#E7DDC4;border:1px solid var(--rule);border-radius:8px;padding:12px 10px;min-height:140px;display:flex;flex-direction:column;gap:6px">
<div style="width:28px;height:4px;background:#8A5A22;border-radius:2px"></div>
<div style="color:#201B12;font-weight:700;font-size:13px">昼 — 公開評議</div>
<div class="cap mono" style="margin-top:auto">day</div>
<div class="cap mono" style="color:#8A5A22">#8A5A22</div>
</div>
<div data-phase="night" style="flex:1;background:#0D0C13;border:1px solid var(--rule);border-radius:8px;padding:12px 10px;min-height:140px;display:flex;flex-direction:column;gap:6px">
<div style="width:28px;height:4px;background:#A9BDD6;border-radius:2px"></div>
<div style="color:#EDE9DC;font-weight:700;font-size:13px">夜 — 一斉消灯</div>
<div class="cap mono" style="margin-top:auto">night</div>
<div class="cap mono" style="color:#A9BDD6">#A9BDD6</div>
</div>
<div data-phase="dawn" style="flex:1;background:#17111A;border:1px solid var(--rule);border-radius:8px;padding:12px 10px;min-height:140px;display:flex;flex-direction:column;gap:6px">
<div style="width:28px;height:4px;background:#B4788C;border-radius:2px"></div>
<div style="color:#EDE9DC;font-weight:700;font-size:13px">夜明け — 判明</div>
<div class="cap mono" style="margin-top:auto">dawn</div>
<div class="cap mono" style="color:#B4788C">#B4788C</div>
</div>
<div data-phase="verdict" style="flex:1;background:#150D10;border:1px solid var(--rule);border-radius:8px;padding:12px 10px;min-height:140px;display:flex;flex-direction:column;gap:6px">
<div style="width:28px;height:4px;background:#C25B5B;border-radius:2px"></div>
<div style="color:#EDE9DC;font-weight:700;font-size:13px">裁定 — 投票</div>
<div class="cap mono" style="margin-top:auto">verdict</div>
<div class="cap mono" style="color:#C25B5B">#C25B5B</div>
</div>
<div data-phase="finished" style="flex:1;background:#14100A;border:1px solid var(--rule);border-radius:8px;padding:12px 10px;min-height:140px;display:flex;flex-direction:column;gap:6px">
<div style="width:28px;height:4px;background:#C9A84C;border-radius:2px"></div>
<div style="color:#EDE9DC;font-weight:700;font-size:13px">終局</div>
<div class="cap mono" style="margin-top:auto">finished</div>
<div class="cap mono" style="color:#C9A84C">#C9A84C</div>
</div>
</div>
