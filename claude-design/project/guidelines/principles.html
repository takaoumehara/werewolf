</style><div class="pad row" style="gap:10px">

<div style="flex:1;background:var(--surface-raised);border:1px solid var(--rule);border-radius:var(--radius-2);padding:14px 12px;box-shadow:var(--shadow-raised)">
<div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:.04em">1. Ritual</div>
<div class="cap" style="margin-top:6px">儀式的な区切り。長い motion はフェーズ演出だけ。</div></div>
<div style="flex:1;background:var(--surface-raised);border:1px solid var(--rule);border-radius:var(--radius-2);padding:14px 12px;box-shadow:var(--shadow-raised)">
<div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:.04em">2. Legibility</div>
<div class="cap" style="margin-top:6px">暗所・小画面・緊張状態でも読める。12px 未満禁止。</div></div>
<div style="flex:1;background:var(--surface-raised);border:1px solid var(--rule);border-radius:var(--radius-2);padding:14px 12px;box-shadow:var(--shadow-raised)">
<div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:.04em">3. Secrecy</div>
<div class="cap" style="margin-top:6px">外観から役職が漏れない。faction 色は Private 限定。</div></div>
<div style="flex:1;background:var(--surface-raised);border:1px solid var(--rule);border-radius:var(--radius-2);padding:14px 12px;box-shadow:var(--shadow-raised)">
<div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:.04em">4. Recoverability</div>
<div class="cap" style="margin-top:6px">切断・誤操作から安全に戻れる。</div></div>
<div style="flex:1;background:var(--surface-raised);border:1px solid var(--rule);border-radius:var(--radius-2);padding:14px 12px;box-shadow:var(--shadow-raised)">
<div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:.04em">5. Restraint</div>
<div class="cap" style="margin-top:6px">カードイラストが主役。装飾は刻印と accent のみ。</div></div>
</div>
