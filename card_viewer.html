<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人狼ゲーム カードデッキ ビューア (HTML Overlay Edition)</title>
    <!-- Google Fonts Load: LINE Seed JP (Bold 700) & Cinzel Decorative (Black 900) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=LINE+Seed+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-w: 360px;
            --card-h: 640px;
        }
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin: 0 0 15px 0;
            text-align: center;
            font-weight: 800;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Layout controls */
        .controls {
            background: rgba(255, 255, 255, 0.04);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .nav-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: #1d4ed8;
        }
        label {
            font-weight: bold;
            font-size: 13px;
            min-width: 90px;
        }
        select {
            background: #1e293b;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            flex-grow: 1;
            outline: none;
        }
        
        /* Language Toggle Switch Style */
        .lang-switch {
            display: flex;
            background: #1e293b;
            border-radius: 6px;
            padding: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-grow: 1;
        }
        .lang-btn {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
            color: #94a3b8;
        }
        .lang-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        /* Card Container (Smartphone 9:16 Aspect Ratio) */
        .card-wrapper {
            position: relative;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            overflow: hidden;
            width: var(--card-w);
            height: var(--card-h);
            background: #111317;
            cursor: pointer;
            perspective: 1000px; /* 3D Camera Perspective */
            transform-style: preserve-3d;
            will-change: transform;
        }
        .card-tap-pulse {
            animation: cardPulse 0.4s ease-out;
        }
        @keyframes cardPulse {
            0% { transform: scale(1.0); }
            30% { transform: scale(0.97); }
            100% { transform: scale(1.0); }
        }
        
        /* The Card Image Background (Rotated in 3D Space) */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            user-select: none;
            overflow: hidden;
            transform-style: preserve-3d;
            will-change: transform;
        }
        .card-layer-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            /* Ambient background slow zoom loop (Cubic Bezier breathing curve) */
            animation: idleZoomBg 16s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
            will-change: transform;
        }
        .card-layer-char {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
            /* Ambient character slow floating loop (Cubic Bezier floating curve) */
            animation: idleFloatChar 6s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
            will-change: transform, filter, opacity;
            transform-origin: center bottom;
        }

        /* --- Ambient Idle Loops (Super Natural Floating, No Mechanical Zoom) --- */
        @keyframes idleFloatChar {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-4px) rotate(0.15deg) translateX(0.5px);
            }
            100% {
                transform: translateY(-7px) rotate(-0.15deg) translateX(-0.5px);
            }
        }
        @keyframes idleZoomBg {
            0% {
                transform: scale(1.0) translate(0, 0);
            }
            100% {
                transform: scale(1.012) translate(-1px, 0.8px);
            }
        }

        /* --- Tap Action Single Shots --- */
        .card-layer-char.action-werewolf {
            /* Anticipation (Tension pull-back) curves */
            animation: actWerewolf 0.55s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }
        .card-layer-char.action-magician {
            animation: actMagician 0.6s ease-in-out forwards;
        }
        .card-layer-char.action-mysterious_fox {
            animation: actFox 0.5s ease-in-out forwards;
        }
        .card-layer-char.action-bodyguard {
            animation: actBodyguard 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .card-layer-char.action-generic {
            animation: actGeneric 0.4s ease-out forwards;
        }

        @keyframes actWerewolf {
            0% { transform: translateY(-4px) scale(1.01); }
            22% { transform: translateY(-14px) scale(0.97) rotate(0.8deg); } /* Anticipation: pull back/shrink before strike */
            50% { transform: translateY(28px) scale(1.18) rotate(-1.5deg); } /* Strike: leap forward */
            100% { transform: translateY(0) scale(1.0); }
        }
        @keyframes actMagician {
            0% { transform: translateY(-4px) scale(1.01) rotateY(0deg); }
            50% { transform: translateY(-16px) scale(1.08) rotateY(15deg); }
            100% { transform: translateY(0) scale(1.0) rotateY(0deg); }
        }
        @keyframes actFox {
            0% { transform: translateY(-4px) scale(1.01); opacity: 1; filter: blur(0px); }
            25% { transform: translateY(-4px) scale(1.01) translateX(-18px); opacity: 0.3; filter: blur(1.5px); }
            60% { transform: translateY(-4px) scale(1.01) translateX(18px); opacity: 0.3; filter: blur(1.5px); }
            100% { transform: translateY(0) scale(1.0); opacity: 1; filter: blur(0px); }
        }
        @keyframes actBodyguard {
            0% { transform: translateY(-4px) scale(1.01); }
            30% { transform: translate(-20px, 12px) scale(1.08); }
            100% { transform: translateY(0) scale(1.0); }
        }
        @keyframes actGeneric {
            0% { transform: translateY(-4px) scale(1.01); }
            40% { transform: translateY(-4px) scale(1.06); }
            100% { transform: translateY(0) scale(1.0); }
        }
        
        /* --- Japanese Mode: Left-Top Vertical Japanese Text (No Outline, Flat White, LINE Seed JP Bold) --- */
        .role-name-japanese {
            writing-mode: vertical-rl;
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 38px;
            color: #ffffff;
            letter-spacing: 6px;
            position: absolute;
            left: 24px;
            top: 30px;
            display: block;
            z-index: 3;
        }
        .role-name-japanese ruby {
            ruby-position: over;
        }
        .role-name-japanese rt {
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 10px;
            color: #ffffff;
            ruby-align: center;
            padding-left: 5px;
        }
        
        /* --- Japanese Mode: Right-Top English Text (80% White, Cinzel Decorative Black) --- */
        .role-name-english-rt {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            position: absolute;
            right: 24px;
            top: 32px;
            letter-spacing: 0.5px;
            display: block;
            text-transform: capitalize;
            z-index: 3;
            text-align: right;
        }
        
        /* --- English Mode: Right-Top Horizontal English Text (100% White, Cinzel Decorative, Right Aligned) --- */
        .role-name-english-vertical {
            writing-mode: horizontal-tb; /* Horizontal writing */
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: 32px; /* Large volume size */
            color: #ffffff; /* 100% White */
            position: absolute;
            right: 24px; /* Shifted to right side as requested */
            left: auto;
            text-align: right; /* Align text to the right */
            top: 30px;
            width: 320px; /* Expanded width to prevent wraps of long words like 'Necromancer' */
            line-height: 1.15;
            letter-spacing: -2px; /* Tight tracking/letter-spacing as requested */
            display: none;
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-transform: capitalize; /* Force Title Case: First letter capitalized, rest lowercase */
            z-index: 3;
        }
        
        /* --- Bottom STICKY Description Band --- */
        .card-description-band {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 3;
        }
        
        /* Camp Icon & Label container (Vertical stack) */
        .camp-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 70px;
            flex-shrink: 0;
        }
        .camp-icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
        }
        .camp-label {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: #ffffff; /* Small white text */
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        
        .description-text {
            font-family: 'LINE Seed JP', sans-serif;
            font-size: 13.5px;
            line-height: 1.5;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.3px;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <h1>人狼ゲーム カード UI ビューア</h1>

    <div class="controls">
        <div class="control-group">
            <label for="role-select">役職の選択:</label>
            <button class="nav-btn" onclick="navigateRole(-1)">◀ 前へ</button>
            <select id="role-select" onchange="updateCard()"></select>
            <button class="nav-btn" onclick="navigateRole(1)">次へ ▶</button>
        </div>
        <div class="control-group">
            <label for="version-select">背景デザイン:</label>
            <select id="version-select" onchange="updateCard()">
                <option value="raw-illustrations-72-a">Ver.A (フラット背景)</option>
                <option value="raw-illustrations-72-a-lifelike">Ver.A Lifelike</option>
                <option value="raw-illustrations-72-a-refined">Ver.A Refined</option>
                <option value="raw-illustrations-72-a2">Ver.A2 (背景描き込み)</option>
                <option value="videos-72">Ver.A2 (動画ループ背景)</option>
                <option value="kling-3">Ver.A2 (Kling 3.0動画)</option>
            </select>
        </div>
        <div class="control-group">
            <label>表示言語:</label>
            <div class="lang-switch">
                <div class="lang-btn active" id="btn-ja" onclick="setLanguage('ja')">日本語 (JA)</div>
                <div class="lang-btn" id="btn-en" onclick="setLanguage('en')">English (EN)</div>
            </div>
        </div>
        <div class="control-group">
            <label>アニメーション:</label>
            <div class="lang-switch">
                <div class="lang-btn active" id="btn-anim-on" onclick="setAnimation(true)">ON</div>
                <div class="lang-btn" id="btn-anim-off" onclick="setAnimation(false)">OFF</div>
            </div>
        </div>
        <div class="control-group" id="gyro-control-group" style="display: none;">
            <label>3D傾きセンサー:</label>
            <div class="lang-switch">
                <div class="lang-btn" id="btn-gyro" onclick="toggleGyro()">有効化 (OFF)</div>
            </div>
        </div>
    </div>

    <!-- The 9:16 Smartphone Card -->
    <div class="card-wrapper" id="card-wrapper" onclick="triggerTapAction()">
        <div class="card" id="card-bg">
            <!-- Dynamic Layer 1: Background -->
            <div class="card-layer-bg" id="layer-bg"></div>
            <!-- Dynamic Layer 1.5: Video Loop (For MP4 animated background) -->
            <video class="card-layer-video" id="layer-video" autoplay loop muted playsinline style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1.8; pointer-events: none;"></video>
            <!-- Dynamic Layer 2: Character (Transparent PNG) -->
            <div class="card-layer-char" id="layer-char"></div>
            <!-- Dynamic Layer 2.2: Character Canvas (For realtime chroma-key rendering) -->
            <canvas class="card-layer-char" id="layer-char-canvas" style="display: none; pointer-events: none; object-fit: cover;"></canvas>
            <!-- Hidden Video for Chroma Key Source -->
            <video id="layer-char-green-video" preload="auto" loop muted playsinline style="display: none;"></video>
            
            <!-- Left-Top Vertical Japanese (Visible in JA mode) -->
            <div class="role-name-japanese" id="role-jp"></div>
            
            <!-- Right-Top Horizontal English (Visible in JA mode) -->
            <div class="role-name-english-rt" id="role-en-rt"></div>
            
            <!-- Left-Top Horizontal English (Visible in EN mode instead of Japanese, Title Case) -->
            <div class="role-name-english-vertical" id="role-en-vertical"></div>
            
            <!-- Bottom STICKY Description Band (Non-scrollable, large font) -->
            <div class="card-description-band">
                <div class="camp-container">
                    <img class="camp-icon" id="camp-icon" src="" alt="Camp Icon">
                    <div class="camp-label" id="camp-label"></div>
                </div>
                <div class="description-text" id="role-desc"></div>
            </div>
        </div>
    </div>

        let isGyroActive = false;

        function toggleGyro() {

                // Request Permission (Required for iOS 13+)
                if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
                    DeviceOrientationEvent.requestPermission()

        function enableGyro() {
            const btn = document.getElementById("btn-gyro");

        function handleGyroMove(e) {
            if (isAnimating) return;
            
            const cardBg = document.getElementById("card-bg");
            const layerBg = document.getElementById("layer-bg");
            const layerChar = document.getElementById("layer-char");
            
            if (!cardBg || !layerBg || !layerChar) return;
            
            // Set base orientation calibration on first read
            if (baseBeta === null) {
                baseBeta = e.beta;
                baseGamma = e.gamma;
                return;
            }
            
            // Calculate delta relative to starting position, clamp within safe limits
            let deltaBeta = e.beta - baseBeta;
            let deltaGamma = e.gamma - baseGamma;
            
            // Clamping to a max of 20 degrees
            deltaBeta = Math.max(-20, Math.min(20, deltaBeta));
            deltaGamma = Math.max(-20, Math.min(20, deltaGamma));
            
            // Map rotation directly (Beta controls rotateX, Gamma controls rotateY)
            const tiltX = deltaBeta * 0.7; // Sensitivity modifier
            const tiltY = -deltaGamma * 0.7;
            
            // Convert to relative ratio (-0.5 to 0.5) for translation parallax
            const ratioX = deltaGamma / 40;
            const ratioY = deltaBeta / 40;
            
            // Pause ambient loop
            layerBg.style.animationPlayState = "paused";
            layerChar.style.animationPlayState = "paused";
            
            // Smooth tilt
            cardBg.style.transition = "transform 0.15s ease-out";
            cardBg.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
            
            layerBg.style.transition = "transform 0.15s ease-out";
            layerBg.style.transform = `scale(1.012) translate(${ratioX * -18}px, ${ratioY * -18}px)`;
            
            layerChar.style.transition = "transform 0.15s ease-out";
            layerChar.style.transform = `translate(${ratioX * 22}px, ${ratioY * 14}px)`;
        }

        function resetParallax() {
            const cardBg = document.getElementById("card-bg");
            const layerBg = document.getElementById("layer-bg");
            const layerChar = document.getElementById("layer-char");
            
            if (!cardBg || !layerBg || !layerChar) return;
            
            // Springy bounce-back physics easing on release
            const springEasing = "transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            
            cardBg.style.transition = springEasing;
            cardBg.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg)";
            
            layerBg.style.transition = springEasing;
            layerBg.style.transform = "scale(1.012) translate(0px, 0px)";
            
            layerChar.style.transition = springEasing;
            layerChar.style.transform = "translate(0px, 0px)";
            
            // Safely resume loops after bounce completes
            setTimeout(() => {
                if (!isGyroActive) {
                    layerBg.style.animationPlayState = "running";
                    layerChar.style.animationPlayState = "running";
                }
            }, 600);
        }

        function init3DParallax() {
            const cardWrapper = document.getElementById("card-wrapper");
            const cardBg = document.getElementById("card-bg");
            const layerBg = document.getElementById("layer-bg");
            const layerChar = document.getElementById("layer-char");
            
            if (!cardWrapper || !cardBg) return;
            
            // Detect Mobile to show gyro controls
            const isMobile = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);
            if (isMobile && isAnimationEnabled) {
                document.getElementById("gyro-control-group").style.display = "block";
            }
            
            let startX = 0;
            let startY = 0;
            let isDragging = false;
            
            const handleTouchStart = (e) => {
                if (!isAnimationEnabled || isAnimating || isGyroActive) return;
                isDragging = true;
                
                const touch = e.touches[0];
                const rect = cardWrapper.getBoundingClientRect();
                startX = touch.clientX - rect.left - rect.width / 2;
                startY = touch.clientY - rect.top - rect.height / 2;
                
                cardBg.style.transition = "none";
                layerBg.style.transition = "none";
                layerChar.style.transition = "none";
                
                layerBg.style.animationPlayState = "paused";
                layerChar.style.animationPlayState = "paused";
            };
            
            const handleTouchMove = (e) => {
                if (!isAnimationEnabled || !isDragging || isAnimating || isGyroActive) return;
                
                const touch = e.touches[0];
                const rect = cardWrapper.getBoundingClientRect();
                
                // Get offset from center (-0.5 to +0.5)
                const offsetX = (touch.clientX - rect.left) / rect.width - 0.5;
                const offsetY = (touch.clientY - rect.top) / rect.height - 0.5;
                
                // Clamp coordinates to keep rotation safe
                const x = Math.max(-0.5, Math.min(0.5, offsetX));
                const y = Math.max(-0.5, Math.min(0.5, offsetY));
                
                // Rotation angle (up to 12 degrees for dynamic mobile touch feedback)
                const tiltX = -y * 22;
                const tiltY = x * 22;
                
                cardBg.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(0.975)`; // Shrink slightly to feel pressed
                
                // Parallel layered shift
                layerBg.style.transform = `scale(1.012) translate(${x * -20}px, ${y * -20}px)`;
                layerChar.style.transform = `translate(${x * 24}px, ${y * 14}px)`;
            };
            
            const handleTouchEnd = () => {
                isDragging = false;
                if (!isAnimationEnabled || isGyroActive) return;
                resetParallax();
            };
            
            // PC Mouse Drag/Hover logic
            const handleMouseMove = (e) => {
                if (!isAnimationEnabled || isAnimating || isGyroActive) return;
                
                layerBg.style.animationPlayState = "paused";
                layerChar.style.animationPlayState = "paused";
                
                const rect = cardWrapper.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                
                const tiltX = -y * 16;
                const tiltY = x * 16;
                
                cardBg.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                layerBg.style.transform = `scale(1.012) translate(${x * -16}px, ${y * -16}px)`;
                layerChar.style.transform = `translate(${x * 20}px, ${y * 12}px)`;
            };
            
            const handleMouseEnter = () => {
                if (isGyroActive) return;
                cardBg.style.transition = "none";
                layerBg.style.transition = "none";
                layerChar.style.transition = "none";
            };
            
            const handleMouseLeave = () => {
                if (isGyroActive) return;
                resetParallax();
            };
            
            // Touch Bindings (Direct Drag-to-Tilt吸い付き)
            cardWrapper.addEventListener("touchstart", handleTouchStart, { passive: true });
            cardWrapper.addEventListener("touchmove", handleTouchMove, { passive: true });
            cardWrapper.addEventListener("touchend", handleTouchEnd);
            
            // Mouse Bindings
            cardWrapper.addEventListener("mousemove", handleMouseMove);
            cardWrapper.addEventListener("mouseenter", handleMouseEnter);
            cardWrapper.addEventListener("mouseleave", handleMouseLeave);
        }

        
        // --- Chroma Key Video Layer Rendering (Optimized for 60fps Mobile Performance) ---
        let chromaInterval = null;
        let chromaVideo = null;
        let chromaCanvas = null;
        let chromaCtx = null;
        let tempCanvas = null;
        let tempCtx = null;
        
        function initChromaKey() {
            chromaVideo = document.getElementById("layer-char-green-video");
            chromaCanvas = document.getElementById("layer-char-canvas");
            chromaCtx = chromaCanvas.getContext("2d", { willReadFrequently: true });
            
            tempCanvas = document.createElement("canvas");
            tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true });
        }
        
        function startChromaKeyLoop() {
            if (chromaInterval) cancelAnimationFrame(chromaInterval);
            
            chromaVideo.play().catch(err => console.log("Video play failed:", err));
            
            function render() {
                if (chromaVideo.paused || chromaVideo.ended) {
                    chromaInterval = requestAnimationFrame(render);
                    return;
                }
                
                // Downsample image process width and height to 360x640 to reduce CPU processing overhead (saves 75% load)
                const w = 360;
                const h = 640;
                
                if (chromaCanvas.width !== w) {
                    chromaCanvas.width = w;
                    chromaCanvas.height = h;
                    tempCanvas.width = w;
                    tempCanvas.height = h;
                }
                
                // Draw downsampled frame
                tempCtx.drawImage(chromaVideo, 0, 0, w, h);
                const imgData = tempCtx.getImageData(0, 0, w, h);
                const data = imgData.data;
                
                // Optimized color key looping for green pixels (#00FF00)
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    
                    // Chroma threshold check: High green relative to red and blue
                    if (g > 80 && g > r * 1.35 && g > b * 1.35) {
                        data[i+3] = 0; // Set pixel fully transparent
                    } else if (g > r * 1.15 && g > b * 1.15) {
                        // Anti-aliased feathering on edges to preserve woodcut line density
                        const factor = (g - Math.max(r, b) * 1.15) / (Math.max(r, b) * 0.2);
                        data[i+3] = Math.max(0, 255 * (1 - factor));
                    }
                }
                
                chromaCtx.putImageData(imgData, 0, 0);
                chromaInterval = requestAnimationFrame(render);
            }
            chromaInterval = requestAnimationFrame(render);
        }
        
        function stopChromaKeyLoop() {
            if (chromaInterval) {
                cancelAnimationFrame(chromaInterval);
                chromaInterval = null;
            }
            if (chromaVideo) {
                chromaVideo.pause();
            }
            if (chromaCanvas) {
                chromaCanvas.style.display = "none";
            }
        }

        function applyUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const roleParam = params.get("role");
            const langParam = params.get("lang");
            const verParam = params.get("ver");
            const roleSelect = document.getElementById("role-select");
            const versionSelect = document.getElementById("version-select");

            if (roleParam && rolesData.some(role => role.id === roleParam)) {
                roleSelect.value = roleParam;
            }

            if (langParam === "en" || langParam === "ja") {
                currentLang = langParam;
                document.getElementById("btn-ja").className = `lang-btn ${langParam === 'ja' ? 'active' : ''}`;
                document.getElementById("btn-en").className = `lang-btn ${langParam === 'en' ? 'active' : ''}`;
            }

            const legacyVersionMap = {
                flat: "raw-illustrations-72-a",
                char: "raw-illustrations-72-a2"
            };
            const normalizedVersion = legacyVersionMap[verParam] || verParam;
            if (normalizedVersion && Array.from(versionSelect.options).some(option => option.value === normalizedVersion)) {
                versionSelect.value = normalizedVersion;
            }
        }

        window.onload = () => {
            initChromaKey();
            applyUrlParams();
            updateCard();
            init3DParallax();
        };
    </script>
</body>
</html>
