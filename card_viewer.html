<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人狼ゲーム カードデッキ ビューア (Card Viewer)</title>
    <!-- Google Fonts Load: LINE Seed JP (Bold 700) & Cinzel Decorative (Black 900) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=LINE+Seed+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-w: 360px;
            --card-h: 640px;
        }
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin: 0 0 15px 0;
            text-align: center;
            font-weight: 800;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Layout controls */
        .controls {
            background: rgba(255, 255, 255, 0.04);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .nav-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: #1d4ed8;
        }
        label {
            font-weight: bold;
            font-size: 13px;
            min-width: 90px;
        }
        select {
            background: #1e293b;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            flex-grow: 1;
            outline: none;
        }
        
        /* Language Toggle Switch Style */
        .lang-switch {
            display: flex;
            background: #1e293b;
            border-radius: 6px;
            padding: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-grow: 1;
        }
        .lang-btn {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
            color: #94a3b8;
        }
        .lang-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        /* Card Container (Smartphone 9:16 Aspect Ratio) */
        .card-wrapper {
            position: relative;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            overflow: hidden;
            width: var(--card-w);
            height: var(--card-h);
            background: #111317;
            user-select: none;
        }
        
        /* The Card Image Layers */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .card-layer-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        .card-layer-char {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }
        
        /* --- Japanese Mode: Left-Top Vertical Japanese Text --- */
        .role-name-japanese {
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: absolute;
            top: 24px;
            left: 24px;
            color: #ffffff;
            font-family: 'LINE Seed JP', sans-serif;
            font-weight: 700;
            font-size: 38px;
            letter-spacing: 6px;
            line-height: 1.0;
            z-index: 10;
        }
        .role-name-japanese ruby {
            ruby-position: over;
        }
        .role-name-japanese rt {
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 700;
            color: #ffffff;
        }

        /* --- Japanese Mode: Right-Top Horizontal English Subtitle --- */
        .role-name-english-rt {
            position: absolute;
            top: 28px;
            right: 24px;
            color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-align: right;
            text-transform: uppercase;
            z-index: 10;
            line-height: 1.2;
            max-width: 180px;
            word-wrap: break-word;
        }

        /* --- English Mode: Right-Top Horizontal Large English Title --- */
        .role-name-english-vertical {
            position: absolute;
            top: 28px;
            right: 24px;
            color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            text-align: right;
            text-transform: uppercase;
            z-index: 10;
            line-height: 1.1;
            max-width: 280px;
            word-wrap: break-word;
        }
        
        /* Bottom STICKY Description Band */
        .card-description-band {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(13, 15, 18, 0.96) 0%, rgba(13, 15, 18, 0.88) 75%, rgba(13, 15, 18, 0) 100%);
            padding: 40px 24px 24px 24px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .camp-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .camp-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }
        .camp-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #e2e8f0;
        }
        .description-text {
            font-size: 13.5px;
            line-height: 1.55;
            color: #f8fafc;
            font-weight: 500;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <h1 id="page-title">人狼ゲーム カードビューア</h1>

    <div class="controls">
        <div class="control-group">
            <button class="nav-btn" id="btn-prev" onclick="prevRole()">← 前へ</button>
            <select id="role-select" onchange="updateCard()"></select>
            <button class="nav-btn" id="btn-next" onclick="nextRole()">次へ →</button>
        </div>
        <div class="control-group">
            <label id="lbl-lang">言語 (LANG):</label>
            <div class="lang-switch">
                <div class="lang-btn active" id="btn-ja" onclick="setLanguage('ja')">日本語</div>
                <div class="lang-btn" id="btn-en" onclick="setLanguage('en')">ENGLISH</div>
            </div>
        </div>
        <div class="control-group">
            <label id="lbl-style">スタイル (STYLE):</label>
            <select id="version-select" onchange="updateCard()">
                <option value="refined">Refined</option>
                <option value="lifelike">Lifelike</option>
                <option value="a">Ver. A</option>
            </select>
        </div>
        <div class="control-group">
            <label id="lbl-bg">背景 (BG):</label>
            <div class="lang-switch">
                <div class="lang-btn active" id="btn-bg-on" onclick="setBackground(true)">ON</div>
                <div class="lang-btn" id="btn-bg-off" onclick="setBackground(false)">OFF</div>
            </div>
        </div>
    </div>

    <!-- The 9:16 Smartphone Card -->
    <div class="card-wrapper" id="card-wrapper">
        <div class="card" id="card-bg">
            <!-- Dynamic Layer 1: Background -->
            <div class="card-layer-bg" id="layer-bg"></div>
            <!-- Dynamic Layer 2: Character -->
            <div class="card-layer-char" id="layer-char"></div>
            
            <!-- Left-Top Vertical Japanese (Visible in JA mode) -->
            <div class="role-name-japanese" id="role-jp"></div>
            
            <!-- Right-Top Horizontal English (Visible in JA mode) -->
            <div class="role-name-english-rt" id="role-en-rt"></div>
            
            <!-- Left-Top Horizontal English (Visible in EN mode) -->
            <div class="role-name-english-vertical" id="role-en-vertical"></div>
            
            <!-- Bottom STICKY Description Band -->
            <div class="card-description-band">
                <div class="camp-container">
                    <img class="camp-icon" id="camp-icon" src="" alt="Camp Icon">
                    <div class="camp-label" id="camp-label"></div>
                </div>
                <div class="description-text" id="role-desc"></div>
            </div>
        </div>
    </div>

    <script>
        const rolesData = [
            { id: "dictator", jp: "独裁者", en: "Dictator", rubies: ["どく", "さい", "しゃ"], camp: "citizen", desc_ja: "投票時に自分の正体を明かすことで、その日の投票を自分一人で決定できる。", desc_en: "By revealing your true identity during the vote, you can decide the vote of the day all by yourself." },
            { id: "knights", jp: "騎士団", en: "Knights", rubies: ["き", "し", "だん"], camp: "citizen", desc_ja: "毎日一人を指定して、人狼の襲撃から守ることができる。ただし自分自身は守れない。", desc_en: "Can protect one player from the werewolf attack every night. Cannot protect themselves." },
            { id: "double", jp: "影武者", en: "Double", rubies: ["かげ", "む", "しゃ"], camp: "citizen", desc_ja: "最初に指定した市民と同じ役職になり、その身代わりとして人狼の前に立ち塞がる。", desc_en: "Becomes the same role as a designated citizen at the start, sacrificing themselves in their place." },
            { id: "counselor", jp: "カウンセラー", en: "Counselor", rubies: ["", "", "", "", "", ""], camp: "citizen", desc_ja: "他のプレイヤーの精神を分析し、人狼の恐怖に呑まれかけている者を正常に導く。", desc_en: "Analyzes the mental state of another player, leading those slipping into werewolf fear back to sanity." },
            { id: "necromancer", jp: "霊媒師", en: "Necromancer", rubies: ["れい", "ばい", "し"], camp: "citizen", desc_ja: "毎夜、前日に処刑されたプレイヤーが「人狼」であったか「人間」であったかを知ることができる。", desc_en: "Can know every night whether the player executed on the previous day was a 'Werewolf' or a 'Human'." },
            { id: "trapper", jp: "罠師", en: "Trapper", rubies: ["わな", "し"], camp: "citizen", desc_ja: "指定した場所に罠を仕掛け、人狼が襲撃に来た際に罠にハメて相打ちに持ち込む。", desc_en: "Sets a trap in a designated place, taking down the werewolf with them if they attack there." },
            { id: "citizen", jp: "市民", en: "Citizen", rubies: ["し", "みん"], camp: "citizen", desc_ja: "特別な能力は持たないが、お互いの信頼と鋭い議論によって人狼の正体を見破る主役。", desc_en: "Has no special abilities, but is the main protagonist who exposes the werewolves through trust and sharp discussions." },
            { id: "prophet", jp: "予言者", en: "Prophet", rubies: ["よ", "げん", "しゃ"], camp: "citizen", desc_ja: "毎夜、生存しているプレイヤーの中から一人を指定し、「人狼」か「人間」かを知ることができる。", desc_en: "Can designate one player every night to learn whether they are a 'Werewolf' or a 'Human'." },
            { id: "bodyguard", jp: "ボディガード", en: "Bodyguard", rubies: ["", "", "", "", "", ""], camp: "citizen", desc_ja: "強靭な肉体で市民を守る。夜の襲撃から指定したプレイヤーを一人だけ守護する。", desc_en: "Protects citizens with a strong body. Protects one designated player from night attacks." },
            { id: "twins", jp: "共有者", en: "Twins", rubies: ["きょう", "ゆう", "しゃ"], camp: "citizen", desc_ja: "もう一人の共有者とお互いが人間であることを最初から知っている、お互いの絆で繋がった二人。", desc_en: "Two players connected by bond who know from the beginning that they are both human." },
            { id: "magician", jp: "奇術師", en: "Magician", rubies: ["き", "じゅつ", "し"], camp: "citizen", desc_ja: "手品のように他のプレイヤーの役職を一時的に入れ替え、議論の方向性を攪乱する。", desc_en: "Temporarily swaps roles of other players like a magic trick to confuse the direction of the discussion." },
            { id: "hunter", jp: "ハンター", en: "Hunter", rubies: ["", "", "", "", ""], camp: "citizen", desc_ja: "自分が処刑または人狼に殺された際、最後の一撃で他のプレイヤー一人を道連れにして死亡する。", desc_en: "When executed or killed by werewolves, takes one other player down with them as a parting shot." },
            { id: "tough_guy", jp: "タフガイ", en: "Tough Guy", rubies: ["", "", "", "", ""], camp: "citizen", desc_ja: "人狼に襲撃されてもその夜は死なず、次の日の夜に怪我の悪化によって死亡するタフな人間。", desc_en: "Does not die the night they are attacked by werewolves, but dies the following night due to worsening wounds." },
            { id: "spy", jp: "スパイ", en: "Spy", rubies: ["", "", "", ""], camp: "werewolf", desc_ja: "市民陣営の中に紛れ込み、夜の会話をこっそり人狼チームへ送信する情報工作員。", desc_en: "Blends in with the citizens and secretly relays the night discussions to the werewolf team." },
            { id: "betrayal_twin", jp: "裏切りの共有者", en: "Betrayal Twin", rubies: ["うら", "ぎ", "", "", "きょう", "ゆう", "しゃ"], camp: "werewolf", desc_ja: "共有者のふりをしているが、実は心は人狼陣営。お互いの正体を知る裏切り者の双子。", desc_en: "Pretends to be a twin but is actually on the werewolf side, knowing each other's identity." },
            { id: "werewolf", jp: "人狼", en: "Werewolf", rubies: ["じん", "ろう"], camp: "werewolf", desc_ja: "人間に化けた狼。毎夜、市民陣営のプレイヤーを一人選び、襲撃して捕食する人狼ゲームの闇。", desc_en: "A wolf disguised as a human. Attacks and eats one citizen player chosen every night." },
            { id: "traitor", jp: "内通者", en: "Traitor", rubies: ["ない", "つう", "しゃ"], camp: "werewolf", desc_ja: "人間でありながら人狼に内通し、人狼チームの勝利のために議論を嘘で誘導する裏切り者。", desc_en: "A human siding with werewolves, leading the discussions with lies to help the werewolf team win." },
            { id: "betrayer", jp: "裏切り者", en: "Betrayer", rubies: ["うら", "ぎ", "", "もの"], camp: "werewolf", desc_ja: "人狼陣営の勝利を望む人間。誰が人狼かは知らないが、市民陣営を攪乱して処刑へ追い込む。", desc_en: "A human who wants the werewolf team to win. Does not know who the werewolves are but leads citizens to execution." },
            { id: "werewolf_child", jp: "人狼の子ども", en: "Werewolf's Child", rubies: ["じん", "ろう", "", "こ", "", ""], camp: "werewolf", desc_ja: "自分が死亡した際、残された人狼たちに強い怒りと力を与え、次の夜の襲撃数を一時的に増やす。", desc_en: "When dead, grants strong rage and power to the remaining werewolves, increasing night attacks." },
            { id: "android", jp: "アンドロイド", en: "Android", rubies: ["", "", "", "", "", ""], camp: "fox", desc_ja: "人間でも狼でもない存在。全てのプレイヤーが死亡し、自分だけが生き残ることで単独勝利する。", desc_en: "Neither human nor wolf. Wins alone if they survive until all other players are dead." },
            { id: "lone_wolf", jp: "一匹狼", en: "Lone Wolf", rubies: ["いっ", "ぴき", "おおかみ"], camp: "werewolf", desc_ja: "他の人狼と会話することはできないが、自分の意志で独立した単独襲撃を行うことができる人狼。", desc_en: "Cannot talk to other werewolves, but can conduct independent single attacks of their own." },
            { id: "god", jp: "神様", en: "God", rubies: ["かみ", "さま", ""], camp: "citizen", desc_ja: "天界から全てを見通す。毎夜、誰が襲撃されたかを神の神託として受け取る高貴な存在。", desc_en: "Sees all from the heavens. Receives the name of the attacked player every night as a divine revelation." },
            { id: "lovers", jp: "恋人", en: "Lovers", rubies: ["こい", "びと", ""], camp: "citizen", desc_ja: "恋に落ちた二人。どちらか一方が死亡した場合、もう片方も悲しみのあまり即座に死亡する。", desc_en: "Two in love. If one dies, the other immediately dies of grief." },
            { id: "mysterious_fox", jp: "妖狐", en: "Mysterious Fox", rubies: ["よう", "こ", ""], camp: "fox", desc_ja: "人狼の襲撃では死なないが、予言者に占われると呪殺され死亡する。最後まで生き残れば単独勝利。", desc_en: "Does not die from werewolf attacks, but dies if divined by the prophet. Wins alone if surviving to the end." },
            { id: "ghost_wolf", jp: "狼の亡霊", en: "Ghost Wolf", rubies: ["おおかみ", "", "ぼう", "れい"], camp: "werewolf", desc_ja: "人狼陣営。人間・人狼ともにカウントされず、死亡後もゲームから離脱せず議論・投票・襲撃相談に参加できる。", desc_en: "Werewolf side. Does not count as human or wolf, and remains active in discussion, voting, and attack plan after death." }
        ];

        const REFINED_POSITIONS = {
            dictator: { scale: 0.91, x: 1.76, y: 7.29 }, knights: { scale: 1.42, x: -2.36, y: -5.99 },
            double: { scale: 0.94, x: -0.13, y: 4.98 }, counselor: { scale: 0.93, x: -2.9, y: 4.63 },
            necromancer: { scale: 1.02, x: 0.75, y: 4.2 }, trapper: { scale: 0.96, x: -1, y: 4.28 },
            citizen: { scale: 0.95, x: 2.21, y: 4.91 }, prophet: { scale: 0.95, x: -1.2, y: 2.93 },
            bodyguard: { scale: 0.92, x: -1.25, y: 3.82 }, twins: { scale: 1.24, x: -0.39, y: 3.37 },
            magician: { scale: 0.9, x: -2.72, y: 0.46 },
            hunter: { scale: 1, x: -0.71, y: 0.72 }, tough_guy: { scale: 1, x: 0, y: 0 }, spy: { scale: 1, x: 0, y: 0 },
            betrayal_twin: { scale: 0.89, x: -0.1, y: 5.32 }, werewolf: { scale: 0.98, x: 0.27, y: 8.16 },
            traitor: { scale: 0.91, x: 1.75, y: 4.57 }, betrayer: { scale: 1, x: 1.57, y: 2.9 },
            werewolf_child: { scale: 0.95, x: -0.15, y: 4.54 }, android: { scale: 1.02, x: 0.68, y: 4.56 },
            lone_wolf: { scale: 1, x: -1.27, y: 4.8 }, god: { scale: 1.09, x: 0, y: 0 },
            lovers: { scale: 1, x: 2.01, y: 0.52 }, mysterious_fox: { scale: 1, x: 0, y: 0 },
            ghost_wolf: { scale: 1.38, x: -2.03, y: -2.77 }
        };

        const styleFolderMap = {
            refined: '00_transparent-illustrations-72-a-refined',
            lifelike: '00_transparent-illustrations-72-a-lifelike',
            a: 'raw-illustrations-transparent-72'
        };

        const assetCacheVersion = '20260719-refined-assets';

        let currentRole = rolesData[0];
        let currentLang = 'ja'; // 'ja' or 'en'
        let bgEnabled = true;

        function versionedAsset(path) {
            return `${path}?v=${assetCacheVersion}`;
        }

        function populateRoleDropdown() {
            const select = document.getElementById("role-select");
            select.innerHTML = "";
            rolesData.forEach(r => {
                const opt = document.createElement("option");
                opt.value = r.id;
                opt.textContent = currentLang === 'ja' ? `${r.jp} (${r.en})` : `${r.en} (${r.jp})`;
                select.appendChild(opt);
            });
            select.value = currentRole.id;
        }

        function updateUIControlsLanguage() {
            document.getElementById("page-title").textContent = currentLang === 'ja' ? "人狼ゲーム カードビューア" : "WEREWOLF CARD VIEWER";
            document.getElementById("btn-prev").textContent = currentLang === 'ja' ? "← 前へ" : "← PREV";
            document.getElementById("btn-next").textContent = currentLang === 'ja' ? "次へ →" : "NEXT →";
            document.getElementById("lbl-lang").textContent = currentLang === 'ja' ? "言語 (LANG):" : "LANG:";
            document.getElementById("lbl-style").textContent = currentLang === 'ja' ? "スタイル (STYLE):" : "STYLE:";
            document.getElementById("lbl-bg").textContent = currentLang === 'ja' ? "背景 (BG):" : "BACKGROUND:";
            
            document.getElementById("btn-ja").classList.toggle("active", currentLang === 'ja');
            document.getElementById("btn-en").classList.toggle("active", currentLang === 'en');

            populateRoleDropdown();
        }

        function setLanguage(lang) {
            currentLang = lang;
            updateUIControlsLanguage();
            updateCard();
        }

        function setBackground(enabled) {
            bgEnabled = enabled;
            document.getElementById("btn-bg-on").classList.toggle("active", bgEnabled);
            document.getElementById("btn-bg-off").classList.toggle("active", !bgEnabled);
            updateCard();
        }

        function prevRole() {
            const idx = rolesData.findIndex(r => r.id === currentRole.id);
            const prevIdx = (idx - 1 + rolesData.length) % rolesData.length;
            currentRole = rolesData[prevIdx];
            document.getElementById("role-select").value = currentRole.id;
            updateCard();
        }

        function nextRole() {
            const idx = rolesData.findIndex(r => r.id === currentRole.id);
            const nextIdx = (idx + 1) % rolesData.length;
            currentRole = rolesData[nextIdx];
            document.getElementById("role-select").value = currentRole.id;
            updateCard();
        }

        function updateCard() {
            const roleId = document.getElementById("role-select").value;
            currentRole = rolesData.find(r => r.id === roleId);

            const styleSelect = document.getElementById("version-select").value; // 'refined', 'lifelike', 'a'
            const layerBg = document.getElementById("layer-bg");
            const layerChar = document.getElementById("layer-char");

            // Reset character transforms
            layerChar.style.transform = "";

            let bgId = currentRole.id;
            let charImgName = `${currentRole.id}_ver_a.png`;

            if (currentRole.id === "magician_c") {
                bgId = "magician";
                charImgName = "magician_ver_c.png";
            }

            // Layer 1: Background
            if (bgEnabled) {
                layerBg.style.backgroundImage = `url('${versionedAsset(`backgrounds-72/${bgId}_bg.png`)}')`;
            } else {
                layerBg.style.backgroundImage = "none";
            }

            // Layer 2: Character
            const charFolder = styleFolderMap[styleSelect] || styleFolderMap.refined;
            const characterPath = versionedAsset(`${charFolder}/${charImgName}`);
            layerChar.style.backgroundImage = `url('${characterPath}')`;
            layerChar.style.display = "block";

            // Position adjustments for Refined style
            if (styleSelect === "refined" && REFINED_POSITIONS[currentRole.id]) {
                const pos = REFINED_POSITIONS[currentRole.id];
                layerChar.style.transform = `translate3d(${pos.x}%, ${pos.y}%, 0) scale(${pos.scale})`;
            }

            // Camp Icon Mapping
            let iconName = currentRole.camp;
            if (currentRole.camp === "fox") {
                iconName = "neutral";
            }
            document.getElementById("camp-icon").src = `icons/camp/${iconName}.png`;

            // Text elements
            const jpLabel = document.getElementById("role-jp");
            const enRtLabel = document.getElementById("role-en-rt");
            const enVerticalLabel = document.getElementById("role-en-vertical");
            const descLabel = document.getElementById("role-desc");
            const campLabel = document.getElementById("camp-label");

            if (currentLang === 'ja') {
                jpLabel.style.display = "block";
                enRtLabel.style.display = "block";
                enVerticalLabel.style.display = "none";

                jpLabel.innerHTML = "";
                const chars = currentRole.jp.split("");
                chars.forEach((char, idx) => {
                    const ruby = document.createElement("ruby");
                    ruby.textContent = char;
                    const rtVal = currentRole.rubies[idx];
                    if (rtVal && rtVal !== "") {
                        const rt = document.createElement("rt");
                        rt.textContent = rtVal;
                        ruby.appendChild(rt);
                    }
                    jpLabel.appendChild(ruby);
                });

                enRtLabel.textContent = currentRole.en;
                descLabel.textContent = currentRole.desc_ja;

                if (currentRole.camp === "citizen") campLabel.textContent = "市民陣営";
                else if (currentRole.camp === "werewolf") campLabel.textContent = "人狼陣営";
                else campLabel.textContent = "第三陣営";
            } else {
                jpLabel.style.display = "none";
                enRtLabel.style.display = "none";
                enVerticalLabel.style.display = "block";

                enVerticalLabel.textContent = currentRole.en;
                descLabel.textContent = currentRole.desc_en;

                if (currentRole.camp === "citizen") campLabel.textContent = "CITIZEN TEAM";
                else if (currentRole.camp === "werewolf") campLabel.textContent = "WEREWOLF TEAM";
                else campLabel.textContent = "NEUTRAL ROLE";
            }
        }

        // Init
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        const langParam = urlParams.get('lang');
        const verParam = urlParams.get('ver');

        if (roleParam && rolesData.some(r => r.id === roleParam)) {
            currentRole = rolesData.find(r => r.id === roleParam);
        }
        if (langParam === 'en' || langParam === 'ja') {
            currentLang = langParam;
        }
        if (verParam && ['refined', 'lifelike', 'a'].includes(verParam)) {
            document.getElementById("version-select").value = verParam;
        }

        updateUIControlsLanguage();
        updateCard();
    </script>
</body>
</html>
